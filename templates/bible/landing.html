{% extends "base.html" %}

{% block title %}[lucasoft] | 오늘의 말씀{% endblock %}

{% block extra_css %}
<style>
/* ===== 앱 컨테이너 ===== */
.bible-app {
    min-height: calc(100vh - 140px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

/* ===== 로딩 화면 ===== */
.loading-screen {
    text-align: center;
    color: white;
}

.spinner {
    width: 50px;
    height: 50px;
    border: 4px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 1rem;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* ===== 에러 화면 ===== */
.error-screen {
    text-align: center;
    color: white;
    padding: 2rem;
}

.error-icon {
    font-size: 3rem;
    margin-bottom: 1rem;
}

.retry-btn {
    background: white;
    color: #764ba2;
    border: none;
    padding: 0.75rem 2rem;
    border-radius: 25px;
    cursor: pointer;
    font-size: 1rem;
    margin-top: 1rem;
}

/* ===== 구절 화면 ===== */
.verse-screen {
    display: none;
    max-width: 800px;
    width: 100%;
}

.verse-container {
    background: rgba(255,255,255,0.95);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    opacity: 1;
    transition: opacity 0.3s ease;
}

.verse-container.fade-out {
    opacity: 0;
}

.verse-image {
    width: 100%;
    height: 300px;
    overflow: hidden;
}

.verse-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.verse-content {
    padding: 2rem;
    text-align: center;
}

.verse-text {
    font-size: 1.5rem;
    line-height: 1.8;
    color: #333;
    margin-bottom: 1rem;
    font-family: 'Noto Serif KR', serif;
}

.verse-reference {
    color: #666;
    font-size: 1rem;
}

/* ===== 네비게이션 ===== */
.navigation {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 2rem;
}

.progress-dots {
    display: flex;
    gap: 0.5rem;
}

.dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    transition: all 0.3s ease;
}

.dot.active {
    background: white;
    transform: scale(1.2);
}

.dot.completed {
    background: rgba(255,255,255,0.8);
}

.next-btn {
    background: white;
    color: #764ba2;
    border: none;
    padding: 0.75rem 2rem;
    border-radius: 25px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 600;
    transition: transform 0.2s ease;
}

.next-btn:hover {
    transform: scale(1.05);
}

.next-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

/* ===== 퀴즈 화면 ===== */
.quiz-screen {
    display: none;
    max-width: 800px;
    width: 100%;
}

.quiz-container {
    background: rgba(255,255,255,0.95);
    border-radius: 20px;
    padding: 2rem;
    text-align: center;
}

.quiz-title {
    color: #764ba2;
    margin-bottom: 1.5rem;
    font-size: 1.5rem;
}

.quiz-text {
    font-size: 1.3rem;
    line-height: 2;
    color: #333;
    margin-bottom: 1rem;
}

.quiz-reference {
    color: #666;
    margin-bottom: 2rem;
}

/* ===== 블라인드 단어 ===== */
.blind-word {
    display: inline-block;
    background: #e0e0e0;
    color: #e0e0e0;
    padding: 0.2rem 0.8rem;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.3s ease;
    min-width: 60px;
    text-align: center;
    user-select: none;
}

.blind-word:hover:not(.revealed) {
    background: #d0d0d0;
    transform: scale(1.05);
}

.blind-word.revealed {
    background: #fff5f5;
    color: var(--primary-color, #ff4b4b);
    font-weight: 600;
    animation: revealPop 0.3s ease;
}

@keyframes revealPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

.restart-btn {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    padding: 0.75rem 2rem;
    border-radius: 25px;
    cursor: pointer;
    font-size: 1rem;
    margin-top: 1rem;
}

/* ===== 완료 메시지 ===== */
.completion-msg {
    display: none;
    color: #4caf50;
    font-weight: 600;
    margin-top: 1rem;
}

.completion-msg.show {
    display: block;
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ===== 반응형 ===== */
@media (max-width: 768px) {
    .bible-app {
        padding: 1rem;
    }

    .verse-image {
        height: 200px;
    }

    .verse-text {
        font-size: 1.2rem;
    }

    .quiz-text {
        font-size: 1.1rem;
    }

    .navigation {
        flex-direction: column;
        gap: 1rem;
    }
}
</style>
{% endblock %}

{% block content %}
<div id="bibleApp" class="bible-app">
    <!-- 로딩 화면 -->
    <div id="loadingScreen" class="loading-screen">
        <div class="spinner"></div>
        <p>말씀을 준비하고 있습니다...</p>
    </div>

    <!-- 에러 화면 -->
    <div id="errorScreen" class="error-screen" style="display: none;">
        <div class="error-icon">😔</div>
        <p>말씀을 불러오는데 실패했습니다.</p>
        <button class="retry-btn" onclick="App.init()">다시 시도</button>
    </div>

    <!-- 구절 표시 화면 -->
    <div id="verseScreen" class="verse-screen">
        <div id="verseContainer" class="verse-container">
            <div class="verse-image">
                <img id="verseImg" src="" alt="성경 이미지"
                     onerror="this.src='/static/images/bible/placeholder.webp'">
            </div>
            <div class="verse-content">
                <p id="verseText" class="verse-text"></p>
                <p id="verseRef" class="verse-reference"></p>
            </div>
        </div>
        <div class="navigation">
            <div class="progress-dots">
                <span class="dot" data-index="0"></span>
                <span class="dot" data-index="1"></span>
                <span class="dot" data-index="2"></span>
                <span class="dot" data-index="3"></span>
            </div>
            <button id="nextBtn" class="next-btn">다음</button>
        </div>
    </div>

    <!-- 퀴즈 화면 -->
    <div id="quizScreen" class="quiz-screen">
        <div class="quiz-container">
            <h2 class="quiz-title">기억하시나요?</h2>
            <p id="quizText" class="quiz-text"></p>
            <p id="quizRef" class="quiz-reference"></p>
            <p id="completionMsg" class="completion-msg">모든 단어를 맞추셨습니다!</p>
            <button class="restart-btn" onclick="App.restart()">다시 시작</button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const App = {
    // ===== 상태 관리 =====
    state: {
        verses: [],
        currentIndex: 0,
        quizVerse: null,
        revealedWords: new Set(),
        isTransitioning: false
    },

    // ===== DOM 요소 =====
    elements: {},

    // ===== 초기화 =====
    init: async function() {
        this.cacheElements();
        this.bindEvents();
        await this.fetchVerses();
    },

    cacheElements: function() {
        this.elements = {
            loadingScreen: document.getElementById('loadingScreen'),
            errorScreen: document.getElementById('errorScreen'),
            verseScreen: document.getElementById('verseScreen'),
            quizScreen: document.getElementById('quizScreen'),
            verseContainer: document.getElementById('verseContainer'),
            verseImg: document.getElementById('verseImg'),
            verseText: document.getElementById('verseText'),
            verseRef: document.getElementById('verseRef'),
            quizText: document.getElementById('quizText'),
            quizRef: document.getElementById('quizRef'),
            nextBtn: document.getElementById('nextBtn'),
            completionMsg: document.getElementById('completionMsg'),
            dots: document.querySelectorAll('.dot')
        };
    },

    bindEvents: function() {
        this.elements.nextBtn.addEventListener('click', () => this.next());

        // 키보드 네비게이션
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                if (this.state.currentIndex < 3) {
                    this.next();
                }
            }
        });
    },

    // ===== API 호출 =====
    fetchVerses: async function() {
        this.showScreen('loading');

        try {
            const response = await fetch('/api/bible-verses/random?count=3');
            if (!response.ok) throw new Error('API 오류');

            const data = await response.json();
            this.state.verses = data.verses;
            this.state.quizVerse = data.verses[Math.floor(Math.random() * 3)];
            this.state.currentIndex = 0;
            this.state.revealedWords = new Set();

            this.showScreen('verse');
            this.renderVerse(0);
        } catch (error) {
            console.error('구절 로드 실패:', error);
            this.showScreen('error');
        }
    },

    // ===== 화면 전환 =====
    showScreen: function(screen) {
        this.elements.loadingScreen.style.display = 'none';
        this.elements.errorScreen.style.display = 'none';
        this.elements.verseScreen.style.display = 'none';
        this.elements.quizScreen.style.display = 'none';

        switch(screen) {
            case 'loading':
                this.elements.loadingScreen.style.display = 'block';
                break;
            case 'error':
                this.elements.errorScreen.style.display = 'block';
                break;
            case 'verse':
                this.elements.verseScreen.style.display = 'block';
                break;
            case 'quiz':
                this.elements.quizScreen.style.display = 'block';
                break;
        }
    },

    // ===== 구절 렌더링 =====
    renderVerse: function(index) {
        const verse = this.state.verses[index];

        this.elements.verseImg.src = `/static/images/bible/${verse.image}`;
        this.elements.verseText.textContent = verse.text;
        this.elements.verseRef.textContent =
            `${verse.reference.book} ${verse.reference.chapter}:${verse.reference.verse}`;

        this.updateDots(index);
        this.elements.nextBtn.textContent = index < 2 ? '다음' : '퀴즈 시작';
    },

    updateDots: function(currentIndex) {
        this.elements.dots.forEach((dot, i) => {
            dot.classList.remove('active', 'completed');
            if (i === currentIndex) {
                dot.classList.add('active');
            } else if (i < currentIndex) {
                dot.classList.add('completed');
            }
        });
    },

    // ===== 다음 버튼 =====
    next: function() {
        if (this.state.isTransitioning) return;

        if (this.state.currentIndex < 2) {
            this.transitionToNext();
        } else {
            this.showQuiz();
        }
    },

    transitionToNext: function() {
        this.state.isTransitioning = true;
        this.elements.nextBtn.disabled = true;

        // 페이드 아웃
        this.elements.verseContainer.classList.add('fade-out');

        setTimeout(() => {
            this.state.currentIndex++;
            this.renderVerse(this.state.currentIndex);

            // 페이드 인
            this.elements.verseContainer.classList.remove('fade-out');

            setTimeout(() => {
                this.state.isTransitioning = false;
                this.elements.nextBtn.disabled = false;
            }, 300);
        }, 300);
    },

    // ===== 퀴즈 =====
    showQuiz: function() {
        this.showScreen('quiz');
        this.updateDots(3);
        this.renderQuiz();
    },

    renderQuiz: function() {
        const verse = this.state.quizVerse;
        let text = verse.text;
        const blindWords = verse.blind_words || [];

        // 블라인드 단어를 span으로 치환 (긴 단어부터 처리하여 부분 매칭 방지)
        const sortedWords = [...blindWords].sort((a, b) => b.length - a.length);

        sortedWords.forEach((word, originalIndex) => {
            const actualIndex = blindWords.indexOf(word);
            const placeholder = `__BLIND_${actualIndex}__`;
            text = text.replace(new RegExp(this.escapeRegex(word), 'g'), placeholder);
        });

        // 플레이스홀더를 실제 span으로 변환
        blindWords.forEach((word, index) => {
            const placeholder = `__BLIND_${index}__`;
            const span = `<span class="blind-word" data-index="${index}" data-word="${word}" onclick="App.revealWord(${index})">____</span>`;
            text = text.replace(new RegExp(placeholder, 'g'), span);
        });

        this.elements.quizText.innerHTML = text;
        this.elements.quizRef.textContent =
            `${verse.reference.book} ${verse.reference.chapter}:${verse.reference.verse}`;
        this.elements.completionMsg.classList.remove('show');
    },

    escapeRegex: function(string) {
        return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    },

    revealWord: function(index) {
        const span = document.querySelector(`.blind-word[data-index="${index}"]`);
        if (!span || span.classList.contains('revealed')) return;

        const word = span.dataset.word;
        span.textContent = word;
        span.classList.add('revealed');
        this.state.revealedWords.add(index);

        // 모든 단어 공개 확인
        const totalWords = this.state.quizVerse.blind_words.length;
        if (this.state.revealedWords.size === totalWords) {
            this.elements.completionMsg.classList.add('show');
        }
    },

    // ===== 재시작 =====
    restart: function() {
        this.state.currentIndex = 0;
        this.state.revealedWords = new Set();
        this.fetchVerses();
    }
};

// 페이지 로드 시 초기화
document.addEventListener('DOMContentLoaded', () => App.init());
</script>
{% endblock %}
