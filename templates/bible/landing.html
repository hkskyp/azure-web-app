{% extends "base.html" %}

{% block title %}[lucasoft] | 오늘의 말씀{% endblock %}

{% block extra_css %}
<style>
/* ===== 앱 컨테이너 ===== */
.bible-app {
    min-height: calc(100vh - var(--header-height));
    background-color: var(--bg-white);
    overflow: hidden;
}

/* ===== 로딩 화면 ===== */
.loading-screen {
    min-height: calc(100vh - 140px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--text-dark);
}

.spinner {
    width: 50px;
    height: 50px;
    border: 4px solid var(--border-color);
    border-top-color: var(--primary-color);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 1rem;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* ===== 에러 화면 ===== */
.error-screen {
    min-height: calc(100vh - 140px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--text-dark);
    padding: 2rem;
}

.error-icon {
    font-size: 3rem;
    margin-bottom: 1rem;
}

.retry-btn {
    background: var(--primary-color);
    color: white;
    border: none;
    padding: 0.75rem 2rem;
    border-radius: 25px;
    cursor: pointer;
    font-size: 1rem;
    margin-top: 1rem;
    transition: all 0.2s ease;
}

.retry-btn:hover {
    background: var(--primary-hover);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(255, 75, 75, 0.3);
}

/* ===== 컨텐츠 컨테이너 ===== */
.content-wrapper {
    height: calc(100vh - var(--header-height));
    position: relative;
}

/* ===== 헤더 ===== */
.page-header {
    text-align: center;
    color: var(--text-dark);
    padding: 2rem 1rem 1rem;
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
    background: linear-gradient(to bottom, var(--bg-white) 80%, transparent);
}

.page-header h1 {
    font-size: 2rem;
    margin-bottom: 0.25rem;
    font-weight: 700;
    color: var(--primary-color);
}

.page-header p {
    font-size: 0.95rem;
    color: var(--text-gray);
}

/* ===== 스크롤 컨테이너 ===== */
.scroll-container {
    display: flex;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;
    height: 100%;
    padding-top: 100px;
    -webkit-overflow-scrolling: touch;
}

/* 스크롤바 숨기기 (선택사항) */
.scroll-container::-webkit-scrollbar {
    display: none;
}

.scroll-container {
    -ms-overflow-style: none;
    scrollbar-width: none;
}

/* ===== 슬라이드 (카드) ===== */
.slide {
    flex: 0 0 100%;
    scroll-snap-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
}

/* ===== 구절 카드 ===== */
.verse-card {
    background: var(--bg-white);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    max-width: 600px;
    width: 100%;
    transition: box-shadow 0.3s ease;
}

.verse-card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
}

.verse-image {
    width: 100%;
    height: 300px;
    overflow: hidden;
    background: var(--bg-light);
}

.verse-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.verse-content {
    padding: 2rem;
    text-align: center;
}

.verse-number {
    display: inline-block;
    width: 40px;
    height: 40px;
    line-height: 40px;
    border-radius: 50%;
    background: var(--primary-color);
    color: white;
    font-weight: 700;
    margin-bottom: 1rem;
}

.verse-text {
    font-size: 1.4rem;
    line-height: 1.8;
    color: var(--text-dark);
    margin-bottom: 1rem;
    font-weight: 500;
}

.verse-reference {
    color: var(--text-gray);
    font-size: 1rem;
    font-weight: 600;
}

/* ===== 퀴즈 카드 ===== */
.quiz-card {
    background: var(--bg-white);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 2.5rem 2rem;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    max-width: 600px;
    width: 100%;
    max-height: calc(100vh - 200px);
    overflow-y: auto;
}

.quiz-title {
    color: var(--primary-color);
    margin-bottom: 1rem;
    font-size: 1.8rem;
    font-weight: 700;
}

.quiz-subtitle {
    color: var(--text-gray);
    margin-bottom: 1.5rem;
    font-size: 1rem;
}

.quiz-text {
    font-size: 1.3rem;
    line-height: 2;
    color: var(--text-dark);
    margin-bottom: 1rem;
    font-weight: 500;
}

.quiz-reference {
    color: var(--text-gray);
    margin-bottom: 1.5rem;
    font-size: 1rem;
    font-weight: 600;
}

/* ===== 블라인드 단어 ===== */
.blind-word {
    display: inline-block;
    background: #e0e0e0;
    color: transparent;
    padding: 0.2rem 0.8rem;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.3s ease;
    min-width: 60px;
    text-align: center;
    user-select: none;
    position: relative;
    font-weight: 600;
}

.blind-word::after {
    content: '?';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    color: #999;
    font-size: 1.2rem;
}

.blind-word:hover:not(.revealed) {
    background: #d0d0d0;
    transform: scale(1.05);
}

.blind-word.revealed {
    background: var(--primary-light);
    color: var(--primary-color);
    animation: revealPop 0.4s ease;
}

.blind-word.revealed::after {
    display: none;
}

@keyframes revealPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
}

/* ===== 통계 정보 ===== */
.quiz-stats {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin: 1rem 0;
    padding: 1rem;
    background: var(--bg-light);
    border-radius: 10px;
}

.stat-item {
    text-align: center;
}

.stat-value {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--primary-color);
}

.stat-label {
    font-size: 0.85rem;
    color: var(--text-gray);
    margin-top: 0.25rem;
}

/* ===== 완료 메시지 ===== */
.completion-msg {
    display: none;
    color: #4caf50;
    font-weight: 700;
    margin-top: 1rem;
    font-size: 1.1rem;
    padding: 0.75rem;
    background: #f1f8f4;
    border-radius: 10px;
}

.completion-msg.show {
    display: block;
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ===== 버튼 ===== */
.restart-btn {
    background: var(--primary-color);
    color: white;
    border: none;
    padding: 0.875rem 2.5rem;
    border-radius: 30px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 600;
    margin-top: 1rem;
    transition: all 0.2s ease;
}

.restart-btn:hover {
    background: var(--primary-hover);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(255, 75, 75, 0.3);
}

/* ===== 네비게이션 인디케이터 ===== */
.nav-indicators {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 0.5rem;
    z-index: 100;
    background: rgba(255, 255, 255, 0.9);
    padding: 0.75rem 1.5rem;
    border-radius: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
}

.nav-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--border-color);
    transition: all 0.3s ease;
    cursor: pointer;
}

.nav-dot.active {
    background: var(--primary-color);
    transform: scale(1.3);
}

.nav-dot:hover {
    background: var(--primary-hover);
}

/* ===== 네비게이션 화살표 ===== */
.nav-arrow {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.9);
    border: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 100;
    transition: all 0.2s ease;
    font-size: 1.5rem;
    color: var(--text-dark);
}

.nav-arrow:hover {
    background: var(--primary-color);
    color: white;
    box-shadow: 0 4px 12px rgba(255, 75, 75, 0.3);
}

.nav-arrow.left {
    left: 2rem;
}

.nav-arrow.right {
    right: 2rem;
}

.nav-arrow.hidden {
    opacity: 0;
    pointer-events: none;
}

/* ===== 반응형 ===== */
@media (max-width: 768px) {
    .page-header h1 {
        font-size: 1.5rem;
    }

    .page-header p {
        font-size: 0.875rem;
    }

    .page-header {
        padding: 1.5rem 1rem 0.75rem;
    }

    .scroll-container {
        padding-top: 80px;
    }

    .slide {
        padding: 1rem;
    }

    .verse-image {
        height: 200px;
    }

    .verse-text {
        font-size: 1.1rem;
    }

    .quiz-text {
        font-size: 1rem;
    }

    .quiz-title {
        font-size: 1.4rem;
    }

    .quiz-card {
        padding: 1.5rem 1rem;
    }

    .quiz-stats {
        flex-direction: column;
        gap: 0.5rem;
    }

    .nav-arrow {
        width: 40px;
        height: 40px;
        font-size: 1.2rem;
    }

    .nav-arrow.left {
        left: 1rem;
    }

    .nav-arrow.right {
        right: 1rem;
    }

    .nav-indicators {
        bottom: 1rem;
        padding: 0.5rem 1rem;
    }
}

/* ===== 숨김 처리 ===== */
.hidden {
    display: none !important;
}
</style>
{% endblock %}

{% block content %}
<div id="bibleApp" class="bible-app">
    <!-- 로딩 화면 -->
    <div id="loadingScreen" class="loading-screen">
        <div class="spinner"></div>
        <p>말씀을 준비하고 있습니다...</p>
    </div>

    <!-- 에러 화면 -->
    <div id="errorScreen" class="error-screen hidden">
        <div class="error-icon">😔</div>
        <p>말씀을 불러오는데 실패했습니다.</p>
        <button class="retry-btn" onclick="App.init()">다시 시도</button>
    </div>

    <!-- 컨텐츠 -->
    <div id="contentWrapper" class="content-wrapper hidden">
        <!-- 헤더 -->
        <div class="page-header">
            <h1>오늘의 말씀</h1>
            <p>하나님의 말씀으로 하루를 시작하세요</p>
        </div>

        <!-- 스크롤 컨테이너 -->
        <div id="scrollContainer" class="scroll-container">
            <!-- 구절 슬라이드들이 여기에 동적으로 추가됨 -->
        </div>

        <!-- 네비게이션 화살표 -->
        <div id="navLeft" class="nav-arrow left hidden" onclick="App.navigate(-1)">‹</div>
        <div id="navRight" class="nav-arrow right" onclick="App.navigate(1)">›</div>

        <!-- 네비게이션 인디케이터 -->
        <div id="navIndicators" class="nav-indicators"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const App = {
    // ===== 상태 관리 =====
    state: {
        verses: [],
        quizVerse: null,
        revealedCount: 0,
        totalBlindWords: 0,
        currentSlide: 0,
        totalSlides: 4
    },

    // ===== DOM 요소 =====
    elements: {},

    // ===== 초기화 =====
    init: async function() {
        this.cacheElements();
        await this.fetchVerses();
    },

    cacheElements: function() {
        this.elements = {
            loadingScreen: document.getElementById('loadingScreen'),
            errorScreen: document.getElementById('errorScreen'),
            contentWrapper: document.getElementById('contentWrapper'),
            scrollContainer: document.getElementById('scrollContainer'),
            navLeft: document.getElementById('navLeft'),
            navRight: document.getElementById('navRight'),
            navIndicators: document.getElementById('navIndicators')
        };
    },

    // ===== API 호출 =====
    fetchVerses: async function() {
        this.showScreen('loading');

        try {
            const response = await fetch('/api/bible-verses/random?count=3');
            if (!response.ok) throw new Error('API 오류');

            const data = await response.json();
            this.state.verses = data.verses;
            this.state.quizVerse = data.verses[Math.floor(Math.random() * 3)];
            this.state.revealedCount = 0;

            this.renderSlides();
            this.setupNavigation();
            this.showScreen('content');
        } catch (error) {
            console.error('구절 로드 실패:', error);
            this.showScreen('error');
        }
    },

    // ===== 화면 전환 =====
    showScreen: function(screen) {
        this.elements.loadingScreen.classList.add('hidden');
        this.elements.errorScreen.classList.add('hidden');
        this.elements.contentWrapper.classList.add('hidden');

        switch(screen) {
            case 'loading':
                this.elements.loadingScreen.classList.remove('hidden');
                break;
            case 'error':
                this.elements.errorScreen.classList.remove('hidden');
                break;
            case 'content':
                this.elements.contentWrapper.classList.remove('hidden');
                break;
        }
    },

    // ===== 슬라이드 렌더링 =====
    renderSlides: function() {
        this.elements.scrollContainer.innerHTML = '';

        // 구절 슬라이드 생성
        this.state.verses.forEach((verse, index) => {
            const slide = document.createElement('div');
            slide.className = 'slide';
            slide.innerHTML = `
                <div class="verse-card">
                    <div class="verse-image">
                        <img src="/static/images/bible/${verse.image}"
                             alt="${verse.reference.book} ${verse.reference.chapter}:${verse.reference.verse}"
                             onerror="this.src='/static/images/bible/placeholder.webp'">
                    </div>
                    <div class="verse-content">
                        <div class="verse-number">${index + 1}</div>
                        <p class="verse-text">${verse.text}</p>
                        <p class="verse-reference">
                            ${verse.reference.book} ${verse.reference.chapter}:${verse.reference.verse}
                        </p>
                    </div>
                </div>
            `;
            this.elements.scrollContainer.appendChild(slide);
        });

        // 퀴즈 슬라이드 생성
        const quizSlide = document.createElement('div');
        quizSlide.className = 'slide';
        quizSlide.innerHTML = `
            <div class="quiz-card">
                <h2 class="quiz-title">🤔 기억하시나요?</h2>
                <p class="quiz-subtitle">빈칸을 클릭하여 단어를 확인하세요</p>
                <p id="quizText" class="quiz-text"></p>
                <p id="quizRef" class="quiz-reference"></p>

                <div class="quiz-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="revealedCount">0</div>
                        <div class="stat-label">맞춘 단어</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="totalCount">0</div>
                        <div class="stat-label">전체 단어</div>
                    </div>
                </div>

                <p id="completionMsg" class="completion-msg">
                    🎉 축하합니다! 모든 단어를 맞추셨습니다!
                </p>

                <button class="restart-btn" onclick="App.restart()">🔄 다시 시작</button>
            </div>
        `;
        this.elements.scrollContainer.appendChild(quizSlide);

        // 퀴즈 렌더링
        this.renderQuiz();
    },

    // ===== 퀴즈 렌더링 =====
    renderQuiz: function() {
        const verse = this.state.quizVerse;
        let text = verse.text;
        const blindWords = verse.blind_words || [];

        const sortedWords = [...blindWords].sort((a, b) => b.length - a.length);
        const replacements = [];

        sortedWords.forEach((word) => {
            const regex = new RegExp(this.escapeRegex(word), 'g');
            const matches = text.match(regex);

            if (matches) {
                matches.forEach((match, matchIndex) => {
                    const uniqueId = `${blindWords.indexOf(word)}_${matchIndex}`;
                    const placeholder = `__BLIND_${uniqueId}__`;
                    text = text.replace(match, placeholder);
                    replacements.push({ placeholder, word, uniqueId });
                });
            }
        });

        replacements.forEach(({ placeholder, word, uniqueId }) => {
            const span = `<span class="blind-word" data-id="${uniqueId}" data-word="${word}" onclick="App.revealWord('${uniqueId}')">${word}</span>`;
            text = text.replace(placeholder, span);
        });

        const quizText = document.getElementById('quizText');
        const quizRef = document.getElementById('quizRef');
        const totalCount = document.getElementById('totalCount');
        const revealedCount = document.getElementById('revealedCount');
        const completionMsg = document.getElementById('completionMsg');

        quizText.innerHTML = text;
        quizRef.textContent = `${verse.reference.book} ${verse.reference.chapter}:${verse.reference.verse}`;

        this.state.totalBlindWords = replacements.length;
        totalCount.textContent = this.state.totalBlindWords;
        revealedCount.textContent = '0';
        completionMsg.classList.remove('show');
    },

    escapeRegex: function(string) {
        return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    },

    // ===== 네비게이션 설정 =====
    setupNavigation: function() {
        // 인디케이터 생성
        this.elements.navIndicators.innerHTML = '';
        for (let i = 0; i < this.state.totalSlides; i++) {
            const dot = document.createElement('div');
            dot.className = `nav-dot ${i === 0 ? 'active' : ''}`;
            dot.onclick = () => this.scrollToSlide(i);
            this.elements.navIndicators.appendChild(dot);
        }

        // 스크롤 이벤트 리스너
        this.elements.scrollContainer.addEventListener('scroll', () => {
            this.updateNavigation();
        });

        this.updateNavigation();
    },

    // ===== 네비게이션 업데이트 =====
    updateNavigation: function() {
        const container = this.elements.scrollContainer;
        const slideWidth = container.clientWidth;
        const scrollLeft = container.scrollLeft;
        const currentSlide = Math.round(scrollLeft / slideWidth);

        this.state.currentSlide = currentSlide;

        // 인디케이터 업데이트
        const dots = this.elements.navIndicators.querySelectorAll('.nav-dot');
        dots.forEach((dot, index) => {
            dot.classList.toggle('active', index === currentSlide);
        });

        // 화살표 표시/숨김
        this.elements.navLeft.classList.toggle('hidden', currentSlide === 0);
        this.elements.navRight.classList.toggle('hidden', currentSlide === this.state.totalSlides - 1);
    },

    // ===== 네비게이션 =====
    navigate: function(direction) {
        const newSlide = this.state.currentSlide + direction;
        if (newSlide >= 0 && newSlide < this.state.totalSlides) {
            this.scrollToSlide(newSlide);
        }
    },

    scrollToSlide: function(index) {
        const container = this.elements.scrollContainer;
        const slideWidth = container.clientWidth;
        container.scrollTo({
            left: slideWidth * index,
            behavior: 'smooth'
        });
    },

    // ===== 단어 공개 =====
    revealWord: function(uniqueId) {
        const span = document.querySelector(`.blind-word[data-id="${uniqueId}"]`);
        if (!span || span.classList.contains('revealed')) return;

        span.classList.add('revealed');
        this.state.revealedCount++;

        const revealedCount = document.getElementById('revealedCount');
        const completionMsg = document.getElementById('completionMsg');

        revealedCount.textContent = this.state.revealedCount;

        if (this.state.revealedCount === this.state.totalBlindWords) {
            setTimeout(() => {
                completionMsg.classList.add('show');
            }, 300);
        }
    },

    // ===== 재시작 =====
    restart: function() {
        this.state.revealedCount = 0;
        this.state.currentSlide = 0;
        this.scrollToSlide(0);
        setTimeout(() => {
            this.fetchVerses();
        }, 500);
    }
};

// 페이지 로드 시 초기화
document.addEventListener('DOMContentLoaded', () => App.init());

// 키보드 네비게이션
document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') {
        App.navigate(-1);
    } else if (e.key === 'ArrowRight') {
        App.navigate(1);
    }
});
</script>
{% endblock %}
