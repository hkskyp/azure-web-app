# 성경 구절 이미지 생성 프롬프트 (Stable Diffusion)
# 전체 성경 확장 가능한 구조

common:
  watercolor_style: "watercolor painting style, soft brush strokes, gentle pastel colors, hand painted, artistic illustration, biblical art"
  negative_prompt: "photograph, 3d render, digital art, realistic, photorealistic, ugly, distorted, modern, dark, violent"

  # 이미지 생성 설정 (SDXL Turbo - 초고속)
  settings:
    width: 768
    height: 432
    steps: 4
    guidance_scale: 0.0

# 현재 샘플: 50개 구절 (향후 전체 성경으로 확장 예정)
